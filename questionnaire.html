<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hootsuite Nest — Setup Questionnaire</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#FF4C46;
  --ac2:#1A1A1A;
  --pale:rgba(255,76,70,0.07);
  --f:'Montserrat',sans-serif;
  --border:#e2e2e2;
  --bg:#ffffff;
  --bg2:#f8f8f8;
  --text:#111111;
  --mid:#555555;
  --hint:#999999;
  --rm:8px;
  --rl:12px;
}
body{font-family:var(--f);background:#f4f4f4;color:var(--text);line-height:1.6;min-height:100vh}

/* ── Layout ── */
.page{max-width:680px;margin:0 auto;padding:2rem 1.25rem 6rem}
.cover{text-align:center;padding:4rem 1.5rem 3rem}
.cover-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:2rem}
.cover-wordmark{font-size:14px;font-weight:600;color:var(--ac);letter-spacing:.3px}
.hs-chip{background:var(--ac);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px}
.cover h1{font-size:28px;font-weight:600;color:var(--text);margin-bottom:.75rem;line-height:1.25}
.cover p{font-size:14px;color:var(--mid);margin-bottom:2rem;line-height:1.7}
.cover-meta{display:flex;justify-content:center;gap:2rem;font-size:12px;color:var(--hint);margin-bottom:2.5rem}
.cover-meta span{display:flex;align-items:center;gap:5px}

/* ── Progress ── */
.progress-bar{background:#fff;border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1.5rem;border:.5px solid var(--border)}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.progress-label{font-size:12px;font-weight:600;color:var(--text)}
.progress-pct{font-size:12px;color:var(--ac);font-weight:600}
.progress-track{height:4px;background:#ebebeb;border-radius:2px;overflow:hidden}
.progress-fill{height:4px;background:var(--ac);border-radius:2px;transition:width .4s ease}
.session-dots{display:flex;gap:8px;margin-top:.75rem}
.sdot{height:6px;flex:1;border-radius:3px;background:#ebebeb;transition:background .3s}
.sdot.done{background:var(--ac)}
.sdot.active{background:var(--ac);opacity:.5}

/* ── Section headers ── */
.section-header{margin:2rem 0 1.25rem}
.section-tag{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ac);margin-bottom:4px}
.section-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.section-desc{font-size:13px;color:var(--mid)}
.session-divider{display:flex;align-items:center;gap:12px;margin:2.5rem 0 2rem}
.session-divider-line{flex:1;height:.5px;background:var(--border)}
.session-divider-label{font-size:11px;font-weight:600;color:var(--hint);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}

/* ── Cards ── */
.q-card{background:#fff;border-radius:var(--rl);border:.5px solid var(--border);padding:1.25rem;margin-bottom:1rem}
.q-card.active{border-color:var(--ac)}
.q-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:.25rem}
.q-hint{font-size:11.5px;color:var(--hint);margin-bottom:.875rem;line-height:1.5}
.q-required{color:var(--ac);margin-left:2px}

/* ── Pills ── */
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill-btn{padding:6px 14px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;color:var(--mid);cursor:pointer;font-family:var(--f);transition:all .15s}
.pill-btn:hover{border-color:var(--ac);color:var(--ac)}
.pill-btn.selected{background:var(--ac);border-color:var(--ac);color:#fff}
.pill-btn.selected-secondary{background:var(--ac2);border-color:var(--ac2);color:#fff}

/* ── Inputs ── */
input[type=text],input[type=email],input[type=color],textarea,select{
  width:100%;padding:9px 12px;border-radius:var(--rm);border:.5px solid var(--border);
  font-family:var(--f);font-size:13px;color:var(--text);background:#fff;outline:none;
  transition:border-color .15s
}
input[type=text]:focus,input[type=email]:focus,textarea:focus,select:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input[type=color]{height:40px;padding:4px 6px;cursor:pointer}
.color-row{display:flex;align-items:center;gap:10px}
.color-preview{width:36px;height:36px;border-radius:var(--rm);border:.5px solid var(--border);flex-shrink:0}

/* ── Slider ── */
.slider-wrap{display:flex;align-items:center;gap:12px}
input[type=range]{flex:1;height:4px;accent-color:var(--ac)}
.slider-val{font-size:14px;font-weight:600;color:var(--ac);min-width:52px;text-align:right}

/* ── Sample messages ── */
.sample-msg{background:var(--bg2);border-radius:var(--rm);padding:10px 14px;margin-bottom:.75rem;border:.5px solid var(--border)}
.sample-msg-network{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sample-msg-text{font-size:13px;color:var(--text);margin-bottom:10px;line-height:1.4}
.sample-msg-actions{display:flex;gap:6px;flex-wrap:wrap}
.action-btn{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:var(--f);transition:opacity .15s}
.action-btn.reply{background:#22863a;color:#fff}
.action-btn.ignore{background:#d73a49;color:#fff}
.action-btn.escalate{background:#e36209;color:#fff}
.action-btn.selected{opacity:.6;transform:scale(.97)}
.sample-extra{margin-top:8px;display:none;gap:6px;flex-direction:column}
.sample-extra.show{display:flex}
.sample-extra input{font-size:12px;padding:7px 10px}

/* ── Confirm box ── */
.confirm-box{background:var(--pale);border:.5px solid var(--ac);border-radius:var(--rm);padding:.875rem 1rem;margin-top:.75rem;font-size:12.5px;color:var(--mid);display:none}
.confirm-box.show{display:block}
.confirm-box strong{color:var(--text)}

/* ── Navigation ── */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:.5px solid var(--border);padding:.875rem 1.25rem;display:flex;justify-content:space-between;align-items:center;z-index:100}
.nav-hint{font-size:11px;color:var(--hint)}
.btn{padding:9px 22px;border-radius:var(--rm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#fff}
.btn-secondary{background:transparent;color:var(--mid);border:.5px solid var(--border)}
.btn-success{background:#22863a;color:#fff}
.btn-group{display:flex;gap:8px}

/* ── Review screen ── */
.review-section{background:#fff;border-radius:var(--rl);border:.5px solid var(--border);margin-bottom:1rem;overflow:hidden}
.review-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:var(--pale);border-bottom:.5px solid var(--border)}
.review-head-title{font-size:13px;font-weight:600;color:var(--text)}
.review-edit{font-size:11px;color:var(--ac);cursor:pointer;font-weight:500}
.review-body{padding:.875rem 1.25rem}
.review-row{display:flex;gap:8px;padding:5px 0;border-bottom:.5px solid #f0f0f0;font-size:12px}
.review-row:last-child{border-bottom:none}
.review-q{color:var(--hint);min-width:160px;flex-shrink:0}
.review-a{color:var(--text);font-weight:500}

/* ── Complete screen ── */
.complete-screen{text-align:center;padding:3rem 1.5rem}
.complete-icon{width:64px;height:64px;background:var(--pale);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:28px}
.complete-title{font-size:24px;font-weight:600;color:var(--text);margin-bottom:.75rem}
.complete-desc{font-size:14px;color:var(--mid);margin-bottom:2rem;line-height:1.7}
.complete-actions{display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto}
.complete-actions .btn{width:100%;padding:11px}

/* ── Misc ── */
.hidden{display:none!important}
.error-msg{font-size:11px;color:#d73a49;margin-top:4px}
.char-count{font-size:11px;color:var(--hint);text-align:right;margin-top:3px}
.brand-swatch{width:24px;height:24px;border-radius:4px;display:inline-block;vertical-align:middle;margin-right:6px;border:.5px solid rgba(0,0,0,.1)}

@media(max-width:500px){
  .input-row{grid-template-columns:1fr}
  .cover h1{font-size:22px}
}
</style>
</head>
<body>

<div class="page" id="app"></div>

<div class="nav-bar" id="nav-bar">
  <span class="nav-hint" id="nav-hint">Session 1 of 3</span>
  <div class="btn-group">
    <button class="btn btn-secondary" id="btn-back" onclick="goBack()" style="display:none">Back</button>
    <button class="btn btn-primary" id="btn-next" onclick="goNext()">Start &rarr;</button>
  </div>
</div>

<script>
// ── CONSULTANT EMAIL (change for each deployment) ──────────────────────────
const CONSULTANT_EMAIL = 'siddharth.amin@hootsuite.com';

// ── STATE ──────────────────────────────────────────────────────────────────
const state = {
  step: 0,
  brandPrimary: '#FF4C46',
  brandSecondary: '#1A1A1A',
  companyName: '',
  industry: '',
  industryConfirmed: false,
  role: '',
  volumeNum: 100,
  volumePeriod: '',
  manageable: '',
  manageableDetail: '',
  workType: '',
  workTypeOther: '',
  specialMessages: '',
  respondTo: [],
  ignore: [],
  samples: [],
  agentCount: 20,
  hasTeams: '',
  teamDetail: '',
  channelRouting: '',
  channelRoutingDetail: '',
  shifts: '',
  shiftsDetail: '',
  features: {},
  consultantEmail: CONSULTANT_EMAIL,
};

const STEPS = [
  'cover','brand','company','industry-confirm','role','volume','manageable',
  'worktype','special','respond-to','ignore','samples',
  'session2-intro','agents','teams','channels','shifts',
  'feat-autoresponder','feat-csat','feat-virtualagent',
  'feat-savedreplies','feat-realtime','feat-contactattribs','feat-resolvereasons',
  'feat-resolvetopics','feat-awaystates','feat-linkshorten',
  'feat-topics','feat-automations','feat-skillsets','feat-prioritisation',
  'feat-contactgroups','feat-removeassignment','feat-langdetect',
  'feat-sla','feat-queueprefs','feat-teamsettings',
  'feat-knowledge','feat-chatbot','feat-smartreplies',
  'feat-channels','feat-crm',
  'feat-deletedcontacts','feat-pii','feat-muted','feat-autoclear',
  'session3-intro','review','complete'
];

const SAMPLE_MSGS = [
  {net:'Instagram', msg:'Love this! Best thing you've ever made 😍'},
  {net:'Twitter/X', msg:'Your website is completely broken — can't place an order'},
  {net:'Facebook', msg:'What are your opening hours this bank holiday?'},
  {net:'Instagram', msg:'first'},
  {net:'Twitter/X', msg:'This is genuinely the worst experience I've ever had with a brand'},
  {net:'Facebook', msg:'Do you cater for nut allergies? My son has a severe reaction'},
  {net:'Instagram', msg:'Do you deliver to Scotland?'},
  {net:'Twitter/X', msg:'Buy cheap followers now DM us #marketing'},
  {net:'Facebook', msg:'Your team went above and beyond today — shoutout to the Manchester team!'},
  {net:'Instagram', msg:'Would love to collab! Check out our page'},
];

const FEATURES = [
  {key:'autoresponder',label:'Autoresponder',hint:'Automatic acknowledgements when customers first contact you, or when outside business hours.',type:'pills3'},
  {key:'csat',label:'CSAT surveys',hint:'Automatically send customer satisfaction surveys after conversations are resolved.',type:'pills3'},
  {key:'virtualagent',label:'Custom virtual agent',hint:'Connect an existing chatbot to handle conversations before escalating to a human.',type:'pills3'},
  {key:'savedreplies',label:'Saved replies',hint:'A shared library of pre-approved response templates for common queries.',type:'pills3'},
  {key:'realtime',label:'Real-time insights',hint:'Live visibility into agent activity, queue volume, and response times.',type:'pills3'},
  {key:'contactattribs',label:'Contact attributes',hint:'Custom fields agents can view or capture during a conversation (e.g. order number, account ID, membership tier).',type:'freetext',placeholder:'e.g. order number, customer tier, booking reference — or "None"'},
  {key:'resolvereasons',label:'Resolve reasons',hint:'Agents log a reason when closing a conversation (e.g. Resolved by agent, Redirected to self-serve).',type:'freetext',placeholder:'e.g. Resolved by agent, Escalated to specialist, Duplicate — or "None"'},
  {key:'resolvetopics',label:'Resolve topics',hint:'Tag conversations with a topic at resolution for reporting purposes.',type:'freetext',placeholder:'e.g. Delivery issue, Billing query, Product feedback — or "None"'},
  {key:'awaystates',label:'Away states',hint:'Agents indicate why they are unavailable rather than simply appearing offline.',type:'pills3'},
  {key:'linkshorten',label:'Link shortening',hint:'Shorten and track URLs shared in conversations via Bitly.',type:'pills3'},
  {key:'topics',label:'Topics',hint:'Tag and route conversations by topic throughout their lifecycle.',type:'freetext',placeholder:'e.g. Delivery issue, Returns, Complaint, Booking query — or describe your main contact reasons'},
  {key:'automations',label:'Automations',hint:'Rules that automatically apply topics, tag messages, or resolve conversations based on keywords, channel, or timing.',type:'freetext',placeholder:'e.g. Messages containing "refund" → apply topic Returns. Spam patterns → auto-resolve. Or "None"'},
  {key:'skillsets',label:'Skill sets',hint:'Route conversations to agents based on specific skills, languages, or specialisms.',type:'freetext',placeholder:'e.g. French-speaking agents, Technical specialists, VIP account managers — or "None"'},
  {key:'prioritisation',label:'Prioritisation',hint:'Certain conversations surface at the top of the queue based on topic, contact group, channel, or conversation type.',type:'freetext',placeholder:'e.g. VIP customers, escalated complaints, private messages — or "None"'},
  {key:'contactgroups',label:'Contact groups',hint:'Segment contacts into groups for different routing or reporting rules.',type:'pills3'},
  {key:'removeassignment',label:'Remove assignment',hint:'Conversations are automatically unassigned when reopened or when an agent goes offline.',type:'pills3'},
  {key:'langdetect',label:'Language detection',hint:'Automatically detect message language and route to agents with the right language skills.',type:'pills3plus',plusLabel:'Which languages?',plusPlaceholder:'e.g. French, Spanish, German'},
  {key:'sla',label:'SLA policies',hint:'Target first response and resolution times.',type:'freetext',placeholder:'e.g. FRT 1 hour all channels, or 30 min for private messages — or "None"'},
  {key:'queueprefs',label:'Queue preferences',hint:'Control how conversations are distributed to agents (e.g. round-robin, queue size limits).',type:'pills3'},
  {key:'teamsettings',label:'Team settings',hint:'Separate queue behaviour or capacity rules per team.',type:'pills3'},
  {key:'knowledge',label:'Knowledge Centre source file',hint:'Existing knowledge base or FAQ content to power AI-suggested responses.',type:'freetext',placeholder:'e.g. Help centre at yoursite.com/help (HTML), internal Confluence wiki, PDF document — or "None"'},
  {key:'chatbot',label:'Generative AI chatbot',hint:'Deploy an AI chatbot to handle common queries automatically before involving a human.',type:'pills3'},
  {key:'smartreplies',label:'Smart replies',hint:'AI suggests contextually relevant responses to agents in real time.',type:'pills3'},
  {key:'channels',label:'Channels',hint:'Which social and messaging channels are active now, and which are planned?',type:'freetext',placeholder:'e.g. Twitter/X, Facebook (pages + Messenger), Instagram. Planning to add WhatsApp in 6 months.'},
  {key:'crm',label:'CRM integration',hint:'Customer data visible to agents during conversations, or written back after resolution.',type:'freetext',placeholder:'e.g. Salesforce — booking reference and case history visible. Case created on resolve. Or "None"'},
  {key:'deletedcontacts',label:'Deleted contacts',hint:'Permanently remove contact records (e.g. for GDPR right-to-erasure requests).',type:'pills3'},
  {key:'pii',label:'PII handling',hint:'Customers share sensitive information (payment details, ID numbers) that needs to be captured securely or masked.',type:'pills3'},
  {key:'muted',label:'Muted contacts',hint:'Suppress notifications or responses for specific contacts (e.g. repeat spam accounts).',type:'pills3'},
  {key:'autoclear',label:'Auto-clear contact attributes',hint:'Contact attribute data purged automatically after a defined retention period.',type:'pills3plus',plusLabel:'After how long?',plusPlaceholder:'e.g. 12 months, 24 months'},
];

let currentFeatureIndex = 0;

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const step = STEPS[state.step];
  applyBrandColours();
  updateProgress();
  updateNav();
  const app = document.getElementById('app');

  if(step === 'cover') { renderCover(app); return; }
  if(step === 'brand') { renderBrand(app); return; }
  if(step === 'company') { renderCompany(app); return; }
  if(step === 'industry-confirm') { renderIndustryConfirm(app); return; }
  if(step === 'role') { renderRole(app); return; }
  if(step === 'volume') { renderVolume(app); return; }
  if(step === 'manageable') { renderManageable(app); return; }
  if(step === 'worktype') { renderWorktype(app); return; }
  if(step === 'special') { renderSpecial(app); return; }
  if(step === 'respond-to') { renderRespondTo(app); return; }
  if(step === 'ignore') { renderIgnore(app); return; }
  if(step === 'samples') { renderSamples(app); return; }
  if(step === 'session2-intro') { renderSession2Intro(app); return; }
  if(step === 'agents') { renderAgents(app); return; }
  if(step === 'teams') { renderTeams(app); return; }
  if(step === 'channels') { renderChannelsRouting(app); return; }
  if(step === 'shifts') { renderShifts(app); return; }
  if(step.startsWith('feat-')) { renderFeature(app, step.replace('feat-','')); return; }
  if(step === 'session3-intro') { renderSession3Intro(app); return; }
  if(step === 'review') { renderReview(app); return; }
  if(step === 'complete') { renderComplete(app); return; }
}

function renderCover(app) {
  app.innerHTML = `
  <div class="cover">
    <div class="cover-logo">
      <span class="hs-chip">Hootsuite</span>
      <span class="cover-wordmark">Nest setup questionnaire</span>
    </div>
    <h1>Let's configure your Nest workspace</h1>
    <p>This questionnaire collects everything your Hootsuite implementation consultant needs to set up Nest for your team. It takes about 20–25 minutes and covers your team structure, workflows, and feature requirements.</p>
    <div class="cover-meta">
      <span>&#9679; 3 sessions</span>
      <span>&#9679; ~25 minutes</span>
      <span>&#9679; Save and resume any time</span>
    </div>
    <p style="font-size:12px;color:#bbb">Your responses will be emailed to your Hootsuite consultant as a JSON file for configuration.</p>
  </div>`;
}

function renderBrand(app) {
  app.innerHTML = `
  <div class="section-header">
    <div class="section-tag">Before we begin</div>
    <div class="section-title">Your brand colours</div>
    <div class="section-desc">We'll apply your brand colours to this questionnaire as you complete it.</div>
  </div>
  <div class="q-card active">
    <div class="q-label">Primary brand colour <span class="q-required">*</span></div>
    <div class="q-hint">Your main brand colour — used for buttons, highlights, and headings.</div>
    <div class="color-row">
      <input type="color" id="brand-primary" value="${state.brandPrimary}" oninput="updateBrandPreview()">
      <div class="color-preview" id="preview-primary" style="background:${state.brandPrimary}"></div>
      <input type="text" id="brand-primary-hex" value="${state.brandPrimary}" placeholder="#FF4C46" style="width:120px" oninput="syncColorFromHex('primary')">
    </div>
  </div>
  <div class="q-card">
    <div class="q-label">Secondary brand colour</div>
    <div class="q-hint">A supporting colour — used for contrast elements. Leave as dark if unsure.</div>
    <div class="color-row">
      <input type="color" id="brand-secondary" value="${state.brandSecondary}" oninput="updateBrandPreview()">
      <div class="color-preview" id="preview-secondary" style="background:${state.brandSecondary}"></div>
      <input type="text" id="brand-secondary-hex" value="${state.brandSecondary}" placeholder="#1A1A1A" style="width:120px" oninput="syncColorFromHex('secondary')">
    </div>
  </div>`;
}

function renderCompany(app) {
  app.innerHTML = `
  <div class="section-header">
    <div class="section-tag">Section 1 of 6 — About you</div>
    <div class="section-title">About your organisation</div>
  </div>
  <div class="q-card active">
    <div class="q-label">What is your company name? <span class="q-required">*</span></div>
    <input type="text" id="company-input" placeholder="e.g. Acme Corp" value="${state.companyName}" oninput="state.companyName=this.value">
  </div>`;
  setTimeout(()=>{ const el=document.getElementById('company-input'); if(el) el.focus(); },100);
}

function renderIndustryConfirm(app) {
  const inferred = inferIndustry(state.companyName);
  if(!state.industryConfirmed) state.industry = inferred;
  app.innerHTML = `
  <div class="section-header">
    <div class="section-tag">Section 1 of 6 — About you</div>
    <div class="section-title">Confirm your industry</div>
  </div>
  <div class="q-card active">
    <div class="q-label">I'm reading <strong>${state.companyName}</strong> as operating in:</div>
    <div class="q-hint" style="font-size:14px;font-weight:600;color:var(--text);margin:8px 0 16px">${state.industry}</div>
    <div class="q-label">Is that right?</div>
    <div class="pills" style="margin-top:8px">
      ${pillBtn('Yes, that's right','ic-yes','ic')}
      ${pillBtn('No, let me specify','ic-no','ic')}
    </div>
  </div>
  <div class="q-card hidden" id="industry-specify-card">
    <div class="q-label">What industry does ${state.companyName} operate in?</div>
    <input type="text" id="industry-input" placeholder="e.g. Healthcare, Financial services, Retail" value="${state.industryConfirmed && state.industry !== inferred ? state.industry : ''}" oninput="state.industry=this.value">
  </div>`;
  setTimeout(()=>restorePills('ic', state.industryConfirmed ? (state.industry === inferred ? 'ic-yes' : 'ic-no') : null), 50);
}

function renderRole(app) {
  app.innerHTML = `
  <div class="section-header">
    <div class="section-tag">Section 1 of 6 — About you</div>
    <div class="section-title">Your role</div>
  </div>
  <div class="q-card active">
    <div class="q-label">What is your role at ${state.companyName}? <span class="q-required">*</span></div>
    <div class="pills" style="margin-top:8px">
      ${['Social media manager','Community manager','Customer care agent','Team lead or manager','Other'].map(r=>pillBtn(r,'role-'+r.replace(/\s+/g,'-'),'role')).join('')}
    </div>
  </div>
  <div class="q-card hidden" id="role-other-card">
    <div class="q-label">Please specify your role</div>
    <input type="text" id="role-other-input" placeholder="Your role" oninput="state.roleOther=this.value">
  </div>`;
  setTimeout(()=>restorePills('role','role-'+state.role.replace(/\s+/g,'-')),50);
}

function renderVolume(app) {
  app.innerHTML = `
  <div class="section-header">
    <div class="section-tag">Section 1 of 6 — About you</div>
    <div class="section-title">Conversation volume</div>
    <div class="section-desc">A conversation = a comment, message, or mention from a distinct person on a distinct topic.</div>
  </div>
  <div class="q-card active">

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function goNext() {
  if(!validateStep()) return;
  saveStepData();
  if(state.step < STEPS.length - 1) {
    state.step++;
    window.scrollTo(0,0);
    render();
  }
}

function goBack() {
  if(state.step > 0) {
    state.step--;
    window.scrollTo(0,0);
    render();
  }
}

function goToStep(stepId) {
  const idx = STEPS.indexOf(stepId);
  if(idx >= 0) { state.step = idx; window.scrollTo(0,0); render(); }
}

function updateNav() {
  const step = STEPS[state.step];
  const back = document.getElementById('btn-back');
  const next = document.getElementById('btn-next');
  const hint = document.getElementById('nav-hint');
  if(back) back.style.display = state.step > 0 ? 'block' : 'none';
  if(next) {
    if(step === 'cover') next.textContent = 'Start →';
    else if(step === 'complete') next.style.display = 'none';
    else if(step === 'review') next.textContent = 'Review complete →';
    else next.textContent = 'Continue →';
    next.style.display = step === 'complete' ? 'none' : 'block';
  }
  if(hint) {
    const s1End = STEPS.indexOf('samples');
    const s2End = STEPS.indexOf('session3-intro');
    if(state.step <= s1End) hint.textContent = 'Session 1 of 3 — Who you are';
    else if(state.step <= s2End) hint.textContent = 'Session 2 of 3 — How you work';
    else hint.textContent = 'Session 3 of 3 — Review & submit';
  }
}

function updateProgress() {
  const pct = Math.round((state.step / (STEPS.length - 1)) * 100);
  const fill = document.querySelector('.progress-fill');
  const pctEl = document.querySelector('.progress-pct');
  if(fill) fill.style.width = pct + '%';
  if(pctEl) pctEl.textContent = pct + '%';
  const s1End = STEPS.indexOf('samples');
  const s2End = STEPS.indexOf('session3-intro');
  const dots = document.querySelectorAll('.sdot');
  if(dots.length === 3) {
    dots[0].className = 'sdot ' + (state.step > s1End ? 'done' : state.step > 0 ? 'active' : '');
    dots[1].className = 'sdot ' + (state.step > s2End ? 'done' : state.step > s1End ? 'active' : '');
    dots[2].className = 'sdot ' + (state.step === STEPS.length-1 ? 'done' : state.step > s2End ? 'active' : '');
  }
}

// ── VALIDATION ─────────────────────────────────────────────────────────────
function validateStep() {
  const step = STEPS[state.step];
  if(step === 'company' && !state.companyName.trim()) { showError('Please enter your company name.'); return false; }
  if(step === 'role' && !state.role) { showError('Please select your role.'); return false; }
  if(step === 'volume' && !state.volumePeriod) { showError('Please select a time period.'); return false; }
  if(step === 'manageable' && !state.manageable) { showError('Please select an option.'); return false; }
  if(step === 'worktype' && !state.workType) { showError('Please select your work type.'); return false; }
  if(step === 'respond-to' && state.respondTo.length === 0) { showError('Please select at least one option.'); return false; }
  if(step === 'shifts' && !state.shifts) { showError('Please select your operating hours.'); return false; }
  if(step === 'agents' && !state.agentCount) { showError('Please set your agent count.'); return false; }
  return true;
}

function showError(msg) {
  const existing = document.querySelector('.error-msg');
  if(existing) existing.remove();
  const err = document.createElement('p');
  err.className = 'error-msg';
  err.textContent = msg;
  err.style.cssText = 'text-align:center;padding:.5rem;font-size:12px;color:#d73a49;margin-bottom:.5rem';
  const nav = document.getElementById('nav-bar');
  if(nav) nav.insertAdjacentElement('beforebegin', err);
  setTimeout(()=>err.remove(), 3000);
}

// ── SAVE STEP DATA ─────────────────────────────────────────────────────────
function saveStepData() {
  const step = STEPS[state.step];
  if(step === 'brand') {
    state.brandPrimary = document.getElementById('brand-primary')?.value || state.brandPrimary;
    state.brandSecondary = document.getElementById('brand-secondary')?.value || state.brandSecondary;
  }
  if(step === 'company') state.companyName = document.getElementById('company-input')?.value.trim() || state.companyName;
  if(step === 'industry-confirm') {
    const noCard = document.getElementById('industry-specify-card');
    if(noCard && !noCard.classList.contains('hidden')) {
      state.industry = document.getElementById('industry-input')?.value.trim() || state.industry;
    }
    state.industryConfirmed = true;
  }
  if(step === 'volume') {
    state.volumeNum = parseInt(document.getElementById('vol-slider')?.value) || state.volumeNum;
  }
  if(step === 'manageable') {
    state.manageableDetail = document.getElementById('mgmt-detail')?.value || state.manageableDetail;
  }
  if(step === 'special') state.specialMessages = document.getElementById('special-input')?.value || state.specialMessages;
  if(step === 'respond-to') {
    state.respondTo = Array.from(document.querySelectorAll('[id^="rt-"].selected')).map(el=>el.textContent.trim()).filter(v=>v!=='All of the above');
  }
  if(step === 'ignore') {
    state.ignore = Array.from(document.querySelectorAll('[id^="ig-"].selected')).map(el=>el.textContent.trim());
  }
  if(step === 'teams') {
    state.teamDetail = document.getElementById('teams-detail')?.value || state.teamDetail;
  }
  if(step === 'channels') {
    state.channelRoutingDetail = document.getElementById('cr-detail')?.value || state.channelRoutingDetail;
  }
  if(step === 'shifts') {
    state.shiftsDetail = document.getElementById('shifts-detail')?.value || state.shiftsDetail;
  }
  if(step.startsWith('feat-')) {
    const key = step.replace('feat-','');
    const feat = FEATURES.find(f=>f.key===key);
    if(feat && (feat.type==='pills3'||feat.type==='pills3plus')) {
      const extra = document.getElementById('feat-plus-input')?.value;
      if(extra !== undefined) state.features[key] = {...(state.features[key]||{}), extra};
    }
  }
}

// ── PILL HANDLERS ──────────────────────────────────────────────────────────
function pillBtn(label, id, group, multi=false) {
  return `<button class="pill-btn" id="${id}" onclick="handlePill('${id}','${group}',${multi},event)">${label}</button>`;
}

function handlePill(id, group, multi, e) {
  const btn = document.getElementById(id);
  if(!btn) return;
  if(multi) {
    if(id === group+'-all') {
      const allBtns = document.querySelectorAll('[id^="'+group+'-"]');
      const allSelected = btn.classList.contains('selected');
      allBtns.forEach(b=>{ if(allSelected) b.classList.remove('selected'); else b.classList.add('selected'); });
    } else {
      btn.classList.toggle('selected');
      const allBtn = document.getElementById(group+'-all');
      if(allBtn) allBtn.classList.remove('selected');
    }
  } else {
    document.querySelectorAll('[id^="'+group+'-"]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    handlePillSideEffects(id, group);
  }
  saveFromPill(id, group);
}

function handlePillSideEffects(id, group) {
  const show = (cardId)=>{ const c=document.getElementById(cardId); if(c) c.classList.remove('hidden'); };
  const hide = (cardId)=>{ const c=document.getElementById(cardId); if(c) c.classList.add('hidden'); };
  if(group==='ic') { id==='ic-no' ? show('industry-specify-card') : hide('industry-specify-card'); }
  if(group==='role') { id==='role-Other' ? show('role-other-card') : hide('role-other-card'); }
  if(group==='mgmt') { id==='mgmt-depends' ? show('mgmt-detail-card') : hide('mgmt-detail-card'); }
  if(group==='wt') { id==='wt-Other' ? show('wt-other-card') : hide('wt-other-card'); }
  if(group==='teams') { (id==='teams-yes'||id==='teams-plan') ? show('teams-detail-card') : hide('teams-detail-card'); }
  if(group==='cr') { id==='cr-yes' ? show('cr-detail-card') : hide('cr-detail-card'); }
  if(group==='shifts') { id!=='shifts-247' ? show('shifts-detail-card') : hide('shifts-detail-card'); }
  if(group==='feat') {
    const step = STEPS[state.step];
    const key = step.replace('feat-','');
    const feat = FEATURES.find(f=>f.key===key);
    const answer = id.replace('feat-','').replace(/-/g,' ');
    const capitalised = answer.charAt(0).toUpperCase()+answer.slice(1);
    state.features[key] = {...(state.features[key]||{}), answer: capitalised};
    if(feat && feat.type==='pills3plus') {
      id==='feat-yes' ? show('feat-plus-card') : hide('feat-plus-card');
    }
  }
}

function saveFromPill(id, group) {
  if(group==='period') state.volumePeriod = id.replace('period-','');
  if(group==='mgmt') state.manageable = id.replace('mgmt-','');
  if(group==='wt') state.workType = id.replace('wt-','').replace(/-/g,' ');
  if(group==='teams') state.hasTeams = id.replace('teams-','');
  if(group==='cr') state.channelRouting = id.replace('cr-','');
  if(group==='shifts') state.shifts = id.replace('shifts-','');
  if(group==='role') state.role = id.replace('role-','').replace(/-/g,' ');
}

function restorePills(group, selectedId) {
  if(!selectedId) return;
  document.querySelectorAll('[id^="'+group+'-"]').forEach(b=>b.classList.remove('selected'));
  const el = document.getElementById(selectedId);
  if(el) { el.classList.add('selected'); handlePillSideEffects(selectedId, group); }
}

function setSampleAction(i, action) {
  state.samples[i].action = action;
  const card = document.getElementById('sample-card-'+i);
  if(!card) return;
  card.querySelectorAll('.action-btn').forEach(b=>b.classList.remove('selected'));
  const btns = card.querySelectorAll('.action-btn');
  const map = {Reply:0, Ignore:1, Escalate:2};
  if(btns[map[action]]) btns[map[action]].classList.add('selected');
  const extra = document.getElementById('sample-extra-'+i);
  if(extra) {
    extra.classList.add('show');
    if(action === 'Escalate') {
      if(!extra.querySelector('input[placeholder*="Escalate"]')) {
        const inp = document.createElement('input');
        inp.type='text'; inp.placeholder='Escalate to whom? (e.g. Customer Care team)';
        inp.value=state.samples[i].escalateTo;
        inp.oninput=()=>state.samples[i].escalateTo=inp.value;
        extra.insertBefore(inp, extra.firstChild);
      }
    } else {
      const escInp = extra.querySelector('input[placeholder*="Escalate"]');
      if(escInp) escInp.remove();
    }
  }
}

// ── BRAND COLOURS ──────────────────────────────────────────────────────────
function applyBrandColours() {
  document.documentElement.style.setProperty('--ac', state.brandPrimary);
  document.documentElement.style.setProperty('--ac2', state.brandSecondary);
  document.documentElement.style.setProperty('--pale', hexToRgba(state.brandPrimary, 0.07));
}

function updateBrandPreview() {
  const p = document.getElementById('brand-primary');
  const s = document.getElementById('brand-secondary');
  if(p) { state.brandPrimary = p.value; document.getElementById('brand-primary-hex').value=p.value; document.getElementById('preview-primary').style.background=p.value; }
  if(s) { state.brandSecondary = s.value; document.getElementById('brand-secondary-hex').value=s.value; document.getElementById('preview-secondary').style.background=s.value; }
  applyBrandColours();
}

function syncColorFromHex(which) {
  const hex = document.getElementById('brand-'+which+'-hex')?.value;
  if(hex && /^#[0-9A-Fa-f]{6}$/.test(hex)) {
    const picker = document.getElementById('brand-'+which);
    if(picker) picker.value = hex;
    if(which==='primary') state.brandPrimary=hex;
    else state.brandSecondary=hex;
    applyBrandColours();
    document.getElementById('preview-'+which).style.background=hex;
  }
}

function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

// ── INDUSTRY INFERENCE ─────────────────────────────────────────────────────
function inferIndustry(name) {
  const n = name.toLowerCase();
  if(/bank|finance|insur|invest|capital|wealth|credit|loan|mortgage/.test(n)) return 'Financial services';
  if(/health|hospital|clinic|pharma|medic|care|nhs|dental/.test(n)) return 'Healthcare';
  if(/tech|software|saas|app|cloud|digital|ai |data|cyber/.test(n)) return 'Technology / SaaS';
  if(/food|drink|cafe|coffee|restaurant|bakery|brewery|wine|beer|groc|supermarket/.test(n)) return 'Food & beverage';
  if(/airline|aviation|airport|flight|travel|hotel|hospitality|tour|holiday/.test(n)) return 'Travel & hospitality';
  if(/retail|shop|store|fashion|apparel|clothes|ecom|commerce/.test(n)) return 'Retail / e-commerce';
  if(/football|soccer|fc|united|city|rovers|wanderers|athletic|sport|rugby|cricket/.test(n)) return 'Soccer / sports';
  if(/council|gov|government|public|ngo|charity|foundation/.test(n)) return 'Public sector / non-profit';
  return 'General / other';
}

function getIndustryExamples(ind) {
  const map = {
    'Financial services': 'regulatory complaints, data breach concerns, fraud reports',
    'Healthcare': 'medical advice requests, patient safety concerns, prescription queries',
    'Technology / SaaS': 'service outages, data loss reports, security vulnerability disclosures',
    'Food & beverage': 'allergen and contamination concerns, food safety complaints, foreign object reports',
    'Travel & hospitality': 'flight disruption, accessibility or medical needs, stranded passengers',
    'Retail / e-commerce': 'refund disputes, order errors, delivery failures',
    'Soccer / sports': 'player welfare abuse requiring safeguarding escalation, gambling promotional content (never engage), injury or transfer speculation (no comment policy)',
    'Public sector / non-profit': 'safeguarding concerns, public health queries, regulatory complaints',
  };
  return map[ind] || 'industry-specific escalations, regulated or sensitive queries, crisis or safety-related messages';
}

// ── JSON + EMAIL ───────────────────────────────────────────────────────────
function buildJSON() {
  return {
    meta: { generated: new Date().toISOString(), company: state.companyName, industry: state.industry, consultantEmail: state.consultantEmail },
    brand: { primary: state.brandPrimary, secondary: state.brandSecondary },
    session1: {
      company: state.companyName, industry: state.industry, role: state.role,
      volume: { count: state.volumeNum >= 500 ? '500+' : state.volumeNum, period: state.volumePeriod },
      manageable: state.manageable, manageableDetail: state.manageableDetail,
      workType: state.workType, workTypeOther: state.workTypeOther,
      specialMessages: state.specialMessages,
      respondTo: state.respondTo, ignore: state.ignore,
      sampleTraining: state.samples,
    },
    session2: {
      agentCount: state.agentCount >= 200 ? '200+' : state.agentCount,
      hasTeams: state.hasTeams, teamDetail: state.teamDetail,
      channelRouting: state.channelRouting, channelRoutingDetail: state.channelRoutingDetail,
      shifts: state.shifts, shiftsDetail: state.shiftsDetail,
      features: state.features,
    }
  };
}

function downloadJSON() {
  const data = JSON.stringify(buildJSON(), null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=state.companyName.replace(/\s+/g,'-').toLowerCase()+'-nest-questionnaire.json';
  a.click(); URL.revokeObjectURL(url);
}

function downloadAndEmail() {
  downloadJSON();
  const subject = encodeURIComponent('Hootsuite Nest Setup Questionnaire — '+state.companyName);
  const body = encodeURIComponent(
    'Hi,\n\nPlease find attached the completed Hootsuite Nest setup questionnaire for '+state.companyName+'.\n\n'+
    'Company: '+state.companyName+'\n'+
    'Industry: '+state.industry+'\n'+
    'Agents: '+(state.agentCount>=200?'200+':state.agentCount)+'\n\n'+
    'The JSON file with full responses is attached.\n\nKind regards'
  );
  window.location.href = 'mailto:'+state.consultantEmail+'?subject='+subject+'&body='+body;
}

// ── PROGRESS BAR HTML ──────────────────────────────────────────────────────
function injectProgressBar() {
  const existing = document.querySelector('.progress-bar');
  if(existing) return;
  const bar = document.createElement('div');
  bar.className = 'progress-bar';
  bar.innerHTML = `
    <div class="progress-top">
      <span class="progress-label">Setup progress</span>
      <span class="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>
    <div class="session-dots"><div class="sdot"></div><div class="sdot"></div><div class="sdot"></div></div>`;
  const page = document.querySelector('.page');
  if(page) page.insertAdjacentElement('afterbegin', bar);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function slugify(str) { return str.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

// ── INIT ───────────────────────────────────────────────────────────────────
render();
setTimeout(()=>{ if(state.step > 0) injectProgressBar(); },50);

const origRender = render;
window.render = function() {
  origRender();
  if(state.step > 0) {
    setTimeout(injectProgressBar, 50);
    setTimeout(updateProgress, 60);
  }
};
</script>
