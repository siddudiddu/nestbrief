<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hootsuite Nest — Setup Questionnaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#FF4C46;--ac2:#1A1A1A;--pale:rgba(255,76,70,0.07);
  --f:'Montserrat',sans-serif;--border:#e2e2e2;--bg:#fff;--bg2:#f8f8f8;
  --text:#111;--mid:#555;--hint:#999;--rm:8px;--rl:12px;
}
body{font-family:var(--f);background:#f4f4f4;color:var(--text);line-height:1.6;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:2rem 1.25rem 6rem}
.cover{text-align:center;padding:4rem 1.5rem 3rem}
.hs-chip{background:var(--ac);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px}
.cover-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:2rem}
.cover-wordmark{font-size:14px;font-weight:600;color:var(--ac)}
.cover h1{font-size:26px;font-weight:600;color:var(--text);margin-bottom:.75rem;line-height:1.25}
.cover p{font-size:14px;color:var(--mid);margin-bottom:1.5rem;line-height:1.7}
.cover-meta{display:flex;justify-content:center;gap:2rem;font-size:12px;color:var(--hint);margin-bottom:2rem}
.progress-bar{background:#fff;border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1.5rem;border:.5px solid var(--border)}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.progress-label{font-size:12px;font-weight:600;color:var(--text)}
.progress-pct{font-size:12px;color:var(--ac);font-weight:600}
.progress-track{height:4px;background:#ebebeb;border-radius:2px;overflow:hidden}
.progress-fill{height:4px;background:var(--ac);border-radius:2px;transition:width .4s ease}
.session-dots{display:flex;gap:8px;margin-top:.75rem}
.sdot{height:6px;flex:1;border-radius:3px;background:#ebebeb;transition:background .3s}
.sdot.done{background:var(--ac)}.sdot.active{background:var(--ac);opacity:.5}
.section-header{margin:2rem 0 1.25rem}
.section-tag{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ac);margin-bottom:4px}
.section-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.section-desc{font-size:13px;color:var(--mid)}
.q-card{background:#fff;border-radius:var(--rl);border:.5px solid var(--border);padding:1.25rem;margin-bottom:1rem}
.q-card.active{border-color:var(--ac)}
.q-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:.25rem}
.q-hint{font-size:11.5px;color:var(--hint);margin-bottom:.875rem;line-height:1.5}
.q-req{color:var(--ac);margin-left:2px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pill-btn{padding:6px 14px;border-radius:20px;border:.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;color:var(--mid);cursor:pointer;font-family:var(--f);transition:all .15s}
.pill-btn:hover{border-color:var(--ac);color:var(--ac)}
.pill-btn.on{background:var(--ac);border-color:var(--ac);color:#fff}
input[type=text],input[type=email],textarea,select{width:100%;padding:9px 12px;border-radius:var(--rm);border:.5px solid var(--border);font-family:var(--f);font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
input[type=text]:focus,input[type=email]:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
input[type=color]{width:48px;height:40px;padding:3px;border-radius:var(--rm);border:.5px solid var(--border);cursor:pointer}
input[type=range]{flex:1;accent-color:var(--ac)}
.slider-wrap{display:flex;align-items:center;gap:12px;margin:8px 0 16px}
.slider-val{font-size:14px;font-weight:600;color:var(--ac);min-width:52px;text-align:right}
.color-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.color-swatch{width:36px;height:36px;border-radius:var(--rm);border:.5px solid var(--border);flex-shrink:0}
.sample-card{background:var(--bg2);border-radius:var(--rm);padding:10px 14px;margin-bottom:.75rem;border:.5px solid var(--border)}
.sample-net{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sample-txt{font-size:13px;color:var(--text);margin-bottom:10px;line-height:1.4}
.sample-actions{display:flex;gap:6px;flex-wrap:wrap}
.act-btn{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:var(--f)}
.act-reply{background:#22863a;color:#fff}.act-ignore{background:#d73a49;color:#fff}.act-escalate{background:#e36209;color:#fff}
.act-btn.on{opacity:.6}
.sample-extra{margin-top:8px;display:none;flex-direction:column;gap:6px}
.sample-extra.show{display:flex}
.review-section{background:#fff;border-radius:var(--rl);border:.5px solid var(--border);margin-bottom:1rem;overflow:hidden}
.review-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:var(--pale);border-bottom:.5px solid var(--border)}
.review-head-title{font-size:13px;font-weight:600;color:var(--text)}
.review-edit{font-size:11px;color:var(--ac);cursor:pointer;font-weight:500}
.review-body{padding:.875rem 1.25rem}
.review-row{display:flex;gap:8px;padding:5px 0;border-bottom:.5px solid #f0f0f0;font-size:12px}
.review-row:last-child{border-bottom:none}
.review-q{color:var(--hint);min-width:150px;flex-shrink:0}
.review-a{color:var(--text);font-weight:500}
.complete-screen{text-align:center;padding:3rem 1.5rem}
.complete-icon{width:64px;height:64px;background:var(--pale);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:28px}
.complete-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:.75rem}
.complete-desc{font-size:14px;color:var(--mid);margin-bottom:2rem;line-height:1.7}
.btn-wrap{display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:.5px solid var(--border);padding:.875rem 1.25rem;display:flex;justify-content:space-between;align-items:center;z-index:100}
.nav-hint{font-size:11px;color:var(--hint)}
.btn{padding:9px 22px;border-radius:var(--rm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#fff}
.btn-secondary{background:transparent;color:var(--mid);border:.5px solid var(--border)}
.btn-success{background:#22863a;color:#fff;width:100%;padding:11px}
.btn-dl{background:transparent;color:var(--mid);border:.5px solid var(--border);width:100%;padding:11px}
.btn-group{display:flex;gap:8px}
.hidden{display:none!important}
.err{font-size:11px;color:#d73a49;text-align:center;padding:.4rem;margin-bottom:.4rem}
.session-intro{text-align:center;padding:2.5rem 1rem}
.s-icon{width:56px;height:56px;background:var(--pale);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:24px}
.s-title{font-size:20px;font-weight:600;margin-bottom:.75rem}
.s-desc{font-size:13px;color:var(--mid);line-height:1.7;max-width:480px;margin:0 auto 1rem}
.s-time{font-size:12px;color:var(--hint)}
@media(max-width:500px){.cover h1{font-size:20px}}
</style>
</head>
<body>
<div class="page" id="app"></div>
<div class="nav-bar" id="nav-bar">
  <span class="nav-hint" id="nav-hint">Session 1 of 3</span>
  <div class="btn-group">
    <button class="btn btn-secondary hidden" id="btn-back" onclick="goBack()">Back</button>
    <button class="btn btn-primary" id="btn-next" onclick="goNext()">Start &rarr;</button>
  </div>
</div>
<script>
var CONSULTANT = 'siddharth.amin@hootsuite.com'; // Change for each deployment

var S = {
  step:0, contextNotes:'',
  company:'', industry:'', indConfirmed:false,
  role:'', volNum:100, volPeriod:'', manageable:'', manageableDetail:'',
  workType:'', specialMsgs:'', respondTo:[], ignore:[],
  samples:[], agentCount:20, hasTeams:'', teamDetail:'',
  chanRouting:'', chanDetail:'', shifts:'', shiftsDetail:'',
  features:{}, consultantEmail:CONSULTANT
};

var MSGS = [
  {net:'Instagram',msg:'Love this! Best thing you\'ve ever made'},
  {net:'Twitter/X',msg:'Your website is completely broken, can\'t place an order'},
  {net:'Facebook',msg:'What are your opening hours this bank holiday?'},
  {net:'Instagram',msg:'first'},
  {net:'Twitter/X',msg:'This is genuinely the worst experience I\'ve ever had with a brand'},
  {net:'Facebook',msg:'Do you cater for nut allergies? My son has a severe reaction'},
  {net:'Instagram',msg:'Do you deliver to Scotland?'},
  {net:'Twitter/X',msg:'Buy cheap followers now DM us #marketing'},
  {net:'Facebook',msg:'Your team went above and beyond today, shoutout to the team!'},
  {net:'Instagram',msg:'Would love to collab! Check out our page'}
];

var FEATS = [
  {k:'autoresponder',lbl:'Autoresponder',hint:'Automatic acknowledgements when customers contact you outside hours or during high volume.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/4402058525595-Use-auto-responders-in-Sparkcentral'},
  {k:'csat',lbl:'CSAT surveys',hint:'Automatically send satisfaction surveys after conversations are resolved.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366206668955-Measure-customer-satisfaction-with-CSAT-surveys'},
  {k:'virtualagent',lbl:'Custom virtual agent',hint:'Connect an existing chatbot to handle conversations before escalating to a human.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366199837723-Connect-a-bot-to-Inbox-2-0'},
  {k:'savedreplies',lbl:'Saved replies',hint:'A shared library of pre-approved response templates for common queries.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366211223451-Speed-up-response-times-with-saved-replies'},
  {k:'realtime',lbl:'Real-time insights',hint:'Live visibility into agent activity, queue volume, and response times.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366218381339-Give-agents-access-to-real-time-insights'},
  {k:'contactattribs',lbl:'Contact attributes',hint:'Custom fields agents can view or capture during a conversation.',tp:'yestext',ph:'e.g. order number, customer tier, booking reference — or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366206485147-Manage-contacts-in-Inbox-2-0'},
  {k:'resolvereasons',lbl:'Resolve reasons',hint:'Agents log a reason when closing a conversation.',tp:'yestext',ph:'e.g. Resolved by agent, Escalated to specialist, Duplicate — or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366218238491-Prompt-agents-to-enter-resolution-information'},
  {k:'resolvetopics',lbl:'Resolve topics',hint:'Tag conversations with a topic at resolution for reporting.',tp:'yestext',ph:'e.g. Delivery issue, Billing query, Product feedback — or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366218238491-Prompt-agents-to-enter-resolution-information'},
  {k:'awaystates',lbl:'Away states',hint:'Agents indicate why they are unavailable rather than simply appearing offline.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366218211739-Track-agent-availability-with-away-states'},
  {k:'linkshorten',lbl:'Link shortening',hint:'Shorten and track URLs shared in conversations via Bitly.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/29474709440411-Inbox-2-0-guide-for-Professional-plan-members'},
  {k:'topics',lbl:'Topics',hint:'Tag and route conversations by topic throughout their lifecycle.',tp:'yestext',ph:'e.g. Delivery issue, Returns, Complaint, Booking query',url:'https://help.hootsuite.com/hc/en-us/articles/5407268543515-Create-and-manage-topics-in-Inbox-2-0'},
  {k:'automations',lbl:'Automations',hint:'Rules that automatically apply topics, tag messages, or resolve conversations.',tp:'yestext',ph:'e.g. Messages with "refund" apply topic Returns. Spam patterns auto-resolve. Or None',url:'https://help.hootsuite.com/hc/en-us/articles/5407252972827-Create-and-manage-automatic-actions'},
  {k:'skillsets',lbl:'Skill sets',hint:'Route conversations to agents based on specific skills or languages.',tp:'yestext',ph:'e.g. French-speaking agents, Technical specialists, VIP managers — or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366207154075-Use-skill-set-routing-in-Inbox-2-0'},
  {k:'prioritisation',lbl:'Prioritisation',hint:'Certain conversations surface at the top of the queue. Rules can be set on topics, contact groups, channels, and conversation type only.',tp:'yestext',ph:'e.g. VIP customers, escalated complaints, private messages — or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366200226075-Prioritize-conversations'},
  {k:'contactgroups',lbl:'Contact groups',hint:'Segment contacts into groups for routing or reporting rules.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366206485147-Manage-contacts-in-Inbox-2-0'},
  {k:'removeassignment',lbl:'Remove assignment',hint:'Conversations automatically unassigned when reopened or agent goes offline.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366200078491-Assignments-in-Inbox-2-0'},
  {k:'langdetect',lbl:'Language detection',hint:'Detect message language and route to agents with the right language skills.',tp:'pillsplus',plusLbl:'Which languages?',plusPh:'e.g. French, Spanish, German',url:'https://help.hootsuite.com/hc/en-us/articles/5407268279067-Detect-a-contact-s-language-in-Inbox-2-0'},
  {k:'sla',lbl:'SLA policies',hint:'Target first response and resolution times.',tp:'yestext',ph:'e.g. FRT 1 hour all channels, or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366199889563-View-SLA-status-in-the-queue'},
  {k:'queueprefs',lbl:'Queue preferences',hint:'Control how conversations are distributed to agents.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366191598107-Set-Inbox-2-0-queue-preferences'},
  {k:'teamsettings',lbl:'Team settings',hint:'Separate queue behaviour or capacity rules per team.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366207188123-Set-up-teams-in-Inbox-2-0'},
  {k:'knowledge',lbl:'Knowledge Centre',hint:'Existing knowledge base or FAQ content to power AI-suggested responses.',tp:'yestext',ph:'e.g. Help centre at yoursite.com/help (HTML), internal wiki — or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366199837723-Connect-a-bot-to-Inbox-2-0'},
  {k:'chatbot',lbl:'Generative AI chatbot',hint:'Deploy an AI chatbot to handle common queries before involving a human.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/27859562681755-Chatbot-quick-start-guide'},
  {k:'smartreplies',lbl:'Smart replies',hint:'AI suggests contextually relevant responses to agents in real time.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/36281074748699-Set-up-AI-powered-smart-replies'},
  {k:'channels',lbl:'Channels',hint:'Which social and messaging channels are active now and planned?',tp:'yestext',ph:'e.g. Twitter/X, Facebook (pages + Messenger), Instagram. Planning WhatsApp in 6 months.',url:'https://help.hootsuite.com/hc/en-us/articles/5366218317851-Manage-channels'},
  {k:'crm',lbl:'CRM integration',hint:'Customer data visible during conversations, or written back after resolution.',tp:'yestext',ph:'e.g. Salesforce — booking reference visible. Case created on resolve. Or None',url:'https://help.hootsuite.com/hc/en-us/articles/5366218263067-Create-Salesforce-cases-from-conversations'},
  {k:'deletedcontacts',lbl:'Deleted contacts',hint:'Permanently remove contact records (e.g. GDPR right-to-erasure).',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366206485147-Manage-contacts-in-Inbox-2-0'},
  {k:'pii',lbl:'PII handling',hint:'Customers share sensitive information that needs secure capture or masking.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366218317851-Manage-channels'},
  {k:'muted',lbl:'Muted contacts',hint:'Suppress notifications for specific contacts such as repeat spam accounts.',tp:'pills',url:'https://help.hootsuite.com/hc/en-us/articles/5366211258651-View-and-manage-muted-contacts'},
  {k:'autoclear',lbl:'Auto-clear attributes',hint:'Contact attribute data purged automatically after a retention period.',tp:'pillsplus',plusLbl:'After how long?',plusPh:'e.g. 12 months, 24 months',url:'https://help.hootsuite.com/hc/en-us/articles/5366206485147-Manage-contacts-in-Inbox-2-0'}
];

var STEPS = ['cover','context','company','industry','role','volume','manageable',
  'worktype','special','respondto','ignore','samples',
  's2intro','agents','teams','chanrouting','shifts'];

FEATS.forEach(function(f){ STEPS.push('feat_'+f.k); });
STEPS.push('s3intro','review','complete');

function el(id){ return document.getElementById(id); }
function app(){ return el('app'); }

function pill(lbl, id, grp, multi){
  var m = multi ? 'true' : 'false';
  return '<button class="pill-btn" id="'+id+'" onclick="hp(\''+id+'\',\''+grp+'\','+m+')">'+lbl+'</button>';
}

function pills3(grp, val){
  return '<div class="pills">'+
    pill('Yes',grp+'-yes',grp,false)+
    pill('No',grp+'-no',grp,false)+
    pill('Not sure',grp+'-ns',grp,false)+
  '</div>';
}

function selPill(id){
  var b = el(id); if(b){ b.classList.add('on'); }
}

function hp(id, grp, multi){
  if(!multi){
    var all = document.querySelectorAll('[id^="'+grp+'-"]');
    for(var i=0;i<all.length;i++) all[i].classList.remove('on');
    var b = el(id); if(b) b.classList.add('on');
    pillSideEffect(id, grp);
    savePill(id, grp);
  } else {
    var b2 = el(id);
    if(b2){ if(b2.classList.contains('on')) b2.classList.remove('on'); else b2.classList.add('on'); }
  }
}

function pillSideEffect(id, grp){
  function show(cid){ var c=el(cid); if(c) c.classList.remove('hidden'); }
  function hide(cid){ var c=el(cid); if(c) c.classList.add('hidden'); }
  if(grp==='ic'){ id==='ic-no' ? show('ind-spec') : hide('ind-spec'); }
  if(grp==='role'){ id==='role-other' ? show('role-oth') : hide('role-oth'); }
  if(grp==='mgmt'){ id==='mgmt-dep' ? show('mgmt-det') : hide('mgmt-det'); }
  if(grp==='wt'){ id==='wt-other' ? show('wt-oth') : hide('wt-oth'); }
  if(grp==='teams'){ (id==='teams-yes'||id==='teams-plan') ? show('teams-det') : hide('teams-det'); }
  if(grp==='cr'){ id==='cr-yes' ? show('cr-det') : hide('cr-det'); }
  if(grp==='shifts'){ id!=='shifts-247' ? show('shifts-det') : hide('shifts-det'); }
  if(grp==='feat'){
    var step = STEPS[S.step];
    var key = step.replace('feat_','');
    var ans = id.replace('feat-','');
    var map = {'yes':'Yes','no':'No','ns':'Not sure'};
    S.features[key] = S.features[key]||{};
    S.features[key].answer = map[ans]||ans;
    var f = FEATS.find(function(x){return x.k===key;});
    if(f && (f.tp==='pillsplus'||f.tp==='yestext')){ ans==='yes' ? show('feat-plus') : hide('feat-plus'); }
  }
}

function savePill(id, grp){
  if(grp==='period') S.volPeriod = id.replace('period-','');
  if(grp==='mgmt') S.manageable = id.replace('mgmt-','');
  if(grp==='wt') S.workType = {'wt-cm':'Community management','wt-cc':'Customer care','wt-both':'Both','wt-other':'Other'}[id]||'';
  if(grp==='teams') S.hasTeams = id.replace('teams-','');
  if(grp==='cr') S.chanRouting = id.replace('cr-','');
  if(grp==='shifts') S.shifts = id.replace('shifts-','');
  if(grp==='role') S.role = {'role-sm':'Social media manager','role-cm':'Community manager','role-cca':'Customer care agent','role-tl':'Team lead or manager','role-other':'Other'}[id]||'';
}

function inferInd(n){
  n = n.toLowerCase().trim();
  // Exact name matches for short/ambiguous names
  if(n==='ey' || n==='e&y') return 'Professional services';
  if(n==='genesis') return 'Financial services';
  if(n==='bat') return 'Consumer goods';
  if(n==='lgc') return 'Life sciences';
  var brands = {
    'allen overy':          'Legal services',
    'allen & overy':        'Legal services',
    'white & case':         'Legal services',
    'white and case':       'Legal services',
    'squire patton':        'Legal services',
    ' ey ':                 'Professional services',
    '- ey ':                'Professional services',
    'ey-':                  'Professional services',
    'ernst young':          'Professional services',
    'aberdeen':             'Financial services',
    'invesco':              'Financial services',
    'tiaa':                 'Financial services',
    'nuveen':               'Financial services',
    'l&g':                  'Financial services',
    'legal & general':      'Financial services',
    'legal and general':    'Financial services',
    'guardian life':        'Financial services',
    'genesis ':            'Financial services',
    '- genesis':           'Financial services',
    'genesis (am)':        'Financial services',
    'uipath':               'Technology / SaaS',
    'ui path':              'Technology / SaaS',
    'ericsson':             'Technology / SaaS',
    'red interactive':      'Technology / SaaS',
    'senseonics':           'Healthcare technology',
    'air canada':           'Travel & hospitality',
    'skyscanner':           'Travel & hospitality',
    'vw group':             'Automotive',
    'volkswagen':           'Automotive',
    'ttec':                 'Business process outsourcing',
    'coca-cola':            'Food & beverage',
    'coca cola':            'Food & beverage',
    'haleon':               'Consumer healthcare',
    'tesco':                'Retail / e-commerce',
    'poundland':            'Retail / e-commerce',
    'british council':      'Education / public sector',
    'national grid':        'Energy / utilities',
    'post office':          'Public sector / non-profit',
    'ad council':           'Non-profit / media',
    'g4s':                  'Security services',
    'superstruct':          'Events & entertainment',
    'wiley':                'Publishing / education',
    'british american tobacco': 'Consumer goods',
    'bat ':                 'Consumer goods',
    'lgc':                  'Life sciences',
  };
  for(var b in brands){ if(n.indexOf(b) !== -1) return brands[b]; }
  if(/bank|financ|insur|invest|capital|wealth|credit|loan|mortgage|barclays|hsbc|lloyds|natwest|santander|goldman|jpmorgan|visa|mastercard/.test(n)) return 'Financial services';

  if(/tech|software|saas|app|cloud|digital|salesforce|hubspot|slack|zoom|microsoft|google|apple|meta|amazon|netflix|spotify/.test(n)) return 'Technology / SaaS';
  if(/food|drink|cafe|coffee|restaurant|bakery|brewery|wine|beer|spirits|pub|cola|pepsi|starbucks|mcdon|burger|kfc|subway|greggs|pret|nando|domino|pizza|heinz|nestle|unilever|danone|innocent|oatly|deliveroo|just.eat|fmcg|cadbury/.test(n)) return 'Food & beverage';
  if(/airline|aviation|airport|flight|travel|hotel|hospitality|tour|holiday|easyjet|ryanair|tui|booking|expedia|airbnb|hilton|marriott/.test(n)) return 'Travel & hospitality';
  if(/retail|shop|store|fashion|apparel|clothes|ecom|asos|zara|primark|marks|spencer|sainsbury|asda|morrisons|waitrose|ocado|argos|currys/.test(n)) return 'Retail / e-commerce';
  if(/fc|united|city|rovers|sport|rugby|cricket|arsenal|chelsea|liverpool|tottenham/.test(n)) return 'Soccer / sports';
  if(/council|gov|government|ngo|charity|foundation|trust|nhs/.test(n)) return 'Public sector / non-profit';
  if(/law|legal|solicitor|barrister|chambers|llp/.test(n)) return 'Legal services';

  if(/publish|media|press|journal|magazine|broadcast/.test(n)) return 'Publishing / media';

function handleFileUpload(input){
  var file = input.files[0];
  if(!file) return;
  var status = el('ctx-file-status');
  if(status) status.textContent = 'Reading ' + file.name + '...';
  var reader = new FileReader();
  if(file.name.endsWith('.txt')){
    reader.onload = function(e){
      var txt = e.target.result;
      var ta = el('ctx-notes');
      if(ta){ ta.value = (ta.value ? ta.value + '\n\n' : '') + txt; S.contextNotes = ta.value; }
      if(status) status.textContent = 'Loaded: ' + file.name;
    };
    reader.readAsText(file);
  } else if(file.name.endsWith('.pdf')){
    reader.onload = function(e){
      var arr = new Uint8Array(e.target.result);
      var raw = '';
      for(var i=0;i<arr.length;i++) raw += String.fromCharCode(arr[i]);
      var matches = raw.match(/\(([^)]{4,500})\)/g)||[];
      var text = matches.map(function(m){ return m.slice(1,-1); }).filter(function(t){ return /[a-zA-Z]{3,}/.test(t); }).join(' ');
      if(text.length > 20){
        var ta = el('ctx-notes');
        if(ta){ ta.value = (ta.value ? ta.value + '\n\n' : '') + '[Extracted from PDF: ' + file.name + ']\n' + text; S.contextNotes = ta.value; }
        if(status) status.textContent = 'Loaded: ' + file.name;
      } else {
        if(status) status.textContent = 'PDF loaded but text could not be extracted. Please paste the content manually.';
      }
    };
    reader.readAsArrayBuffer(file);
  } else if(file.name.endsWith('.docx')){
    reader.onload = function(e){
      var arr = new Uint8Array(e.target.result);
      var raw = '';
      for(var i=0;i<arr.length;i++) raw += String.fromCharCode(arr[i]);
      var matches = raw.match(/<w:t[^>]*>([^<]+)<\/w:t>/g)||[];
      var text = matches.map(function(m){ return m.replace(/<[^>]+>/g,''); }).join(' ');
      if(text.length > 20){
        var ta = el('ctx-notes');
        if(ta){ ta.value = (ta.value ? ta.value + '\n\n' : '') + '[Extracted from DOCX: ' + file.name + ']\n' + text; S.contextNotes = ta.value; }
        if(status) status.textContent = 'Loaded: ' + file.name;
      } else {
        if(status) status.textContent = 'DOCX loaded but text could not be extracted. Please paste the content manually.';
      }
    };
    reader.readAsBinaryString(file);
  }
}

function setSA(i, action){
  S.samples[i].action = action;
  var card = document.querySelectorAll('.sample-card')[i];
  if(!card) return;
  card.querySelectorAll('.act-btn').forEach(function(b){ b.classList.remove('on'); });
  var map={'Reply':0,'Ignore':1,'Escalate':2};
  var btns = card.querySelectorAll('.act-btn');
  if(btns[map[action]]) btns[map[action]].classList.add('on');
  var extra = el('se'+i);
  if(extra){
    extra.className = 'sample-extra show';
    var hasEsc = extra.querySelector('input[placeholder*="Escalate"]');
    if(action==='Escalate' && !hasEsc){
      var inp = document.createElement('input');
      inp.type='text'; inp.placeholder='Escalate to whom?';
      inp.value=S.samples[i].escalateTo;
      inp.addEventListener('input',function(){ S.samples[i].escalateTo=this.value; });
      extra.insertBefore(inp, extra.firstChild);
    } else if(action!=='Escalate' && hasEsc){
      hasEsc.remove();
    }
  }
}

    if(S.hasTeams && tmap[S.hasTeams]){ selPill(tmap[S.hasTeams]); pillSideEffect(tmap[S.hasTeams],'teams'); }
  },50);
}

function renderChanRouting(a){
  a.innerHTML =
    h('div','section-header',
      h('div','section-tag','Section 5 of 6 &mdash; Team structure')+
      h('div','section-title','Channel and language routing')
    )+
    h('div','q-card active',
      h('div','q-label','Do different teams or agents handle different channels, languages, or segments?')+
      h('div','pills',pill('Yes','cr-yes','cr',false)+pill('No','cr-no','cr',false))
    )+
    h('div','q-card hidden',
      h('div','q-label','Tell us more')+
      '<textarea id="cr-det-inp" placeholder="e.g. Social Care handles Twitter/X DMs. Community handles Instagram. French agents handle European markets." oninput="S.chanDetail=this.value">'+S.chanDetail+'</textarea>',
      'id="cr-det"'
    );
  setTimeout(function(){
    if(S.chanRouting){ selPill('cr-'+S.chanRouting); pillSideEffect('cr-'+S.chanRouting,'cr'); }
  },50);
}

function renderShifts(a){
  a.innerHTML =
    h('div','section-header',
      h('div','section-tag','Section 5 of 6 &mdash; Team structure')+
      h('div','section-title','Operating hours')
    )+
    h('div','q-card active',
      h('div','q-label','What are your operating hours? '+h('span','q-req','*'))+
      h('div','pills',
        pill('24/7','shifts-247','shifts',false)+
        pill('Business hours only','shifts-biz','shifts',false)+
        pill('Extended hours (evenings/weekends)','shifts-ext','shifts',false)+
        pill('Varies by team','shifts-var','shifts',false)
      )
    )+
    h('div','q-card hidden',
      h('div','q-label','Describe your hours and out-of-hours behaviour')+
      '<textarea id="shifts-det-inp" placeholder="e.g. Mon-Fri 9am-6pm. Out of hours: autoresponse holds in queue." oninput="S.shiftsDetail=this.value">'+S.shiftsDetail+'</textarea>',
      'id="shifts-det"'
    );
  setTimeout(function(){
    if(S.shifts){ selPill('shifts-'+S.shifts); pillSideEffect('shifts-'+S.shifts,'shifts'); }
  },50);
}

function renderFeat(a, key){
  var f = FEATS.find(function(x){ return x.k===key; });
  if(!f) return;
  var val = S.features[key]||{};
  var inputHtml = '';
  if(f.tp==='pills'||f.tp==='pillsplus'||f.tp==='yestext'){
    inputHtml = h('div','pills',
      pill('Yes','feat-yes','feat',false)+
      pill('No','feat-no','feat',false)+
      pill('Not sure','feat-ns','feat',false)
    );
    if(f.tp==='pillsplus'){
      inputHtml += h('div','q-card hidden',
        h('div','q-label',f.plusLbl)+
        '<input type="text" id="feat-plus-inp" placeholder="'+f.plusPh+'" value="'+(val.extra||'')+'" oninput="S.features[\''+key+'\']=S.features[\''+key+'\']||{};S.features[\''+key+'\'].extra=this.value">',
        'id="feat-plus"'
      );
    }

  } else {
    inputHtml = '<textarea id="feat-txt" placeholder="'+(f.ph||'')+'" oninput="S.features[\''+key+'\']=S.features[\''+key+'\']||{};S.features[\''+key+'\'].value=this.value">'+(val.value||'')+'</textarea>';
  }
  var fIdx = FEATS.findIndex(function(x){ return x.k===key; });
  var totalFeats = FEATS.length;
  var detailCard = '';
  if(f.tp==='yestext'){
    var ytVal = (val.answer==='Yes') ? (val.value||'') : '';
    detailCard = h('div','q-card hidden',
      h('div','q-label','Please provide details')+
      '<textarea id="feat-txt" placeholder="'+(f.ph||'')+'" oninput="S.features[\''+key+'\']=S.features[\''+key+'\']||{};S.features[\''+key+'\'].value=this.value">'+ytVal+'</textarea>',
      'id="feat-plus"'
    );
    inputHtml = h('div','pills',
      pill('Yes','feat-yes','feat',false)+
      pill('No','feat-no','feat',false)+
      pill('Not sure','feat-ns','feat',false)
    );
  }
  a.innerHTML =
    h('div','section-header',
      h('div','section-tag','Section 6 of 6 &mdash; Features ('+(fIdx+1)+' of '+totalFeats+')')+
      h('div','section-title',f.lbl)+
      h("div","section-desc",f.hint+(f.url?" &nbsp;<a href='"+f.url+"' target='_blank' rel='noopener' style='font-size:11px;color:var(--ac);font-weight:500'>Learn more &#8599;</a>":""))
    )+
    h('div','q-card active',
      h('div','q-label','Do you need this feature? '+h('span','q-req','*'))+
      inputHtml
    )+
    detailCard;
  setTimeout(function(){
    var ans = val.answer;
    if(ans){
      var amap={'Yes':'feat-yes','No':'feat-no','Not sure':'feat-ns'};
      if(amap[ans]){ selPill(amap[ans]); pillSideEffect(amap[ans],'feat'); }
    } else if(f.tp==='yestext' && val.value){ selPill('feat-yes'); pillSideEffect('feat-yes','feat'); }
  },50);
}

function renderS3Intro(a){
  a.innerHTML = h('div','session-intro',
    h('div','s-icon','&#10003;')+
    h('h2','s-title','Session 3 &mdash; Review &amp; submit')+
    h('p','s-desc','Almost done. Review your answers on the next screen, then submit to your Hootsuite consultant.')+
    h('p','s-time','Estimated time: 5 minutes')
  );
}

function renderReview(a){
  function rrow(q,v){ return h('div','review-row',h('span','review-q',q)+h('span','review-a',v||'&mdash;')); }
  var featureRows = FEATS.map(function(f){
    var v = S.features[f.k]||{};
    var disp = v.answer||(v.value?(v.value.length>60?v.value.substring(0,60)+'&hellip;':v.value):'&mdash;');
    if(v.extra) disp += ' ('+v.extra+')';
    return rrow(f.lbl, disp);
  }).join('');
  a.innerHTML =
    h('div','section-header',
      h('div','section-tag','Session 3 &mdash; Review')+
      h('div','section-title','Check your answers')+
      h('div','section-desc','Review everything before submitting.')
    )+
    h('div','review-section',
      h('div','review-head',h('span','review-head-title','About you')+h('span','review-edit','Edit','onclick="goToStep(\'company\')"'))+
      h('div','review-body',
        rrow('Company',S.company)+rrow('Industry',S.industry)+rrow('Role',S.role)+
        rrow('Volume',(S.volNum>=500?'500+':S.volNum)+' '+S.volPeriod.toLowerCase())+
        rrow('Manageable?',S.manageable+(S.manageableDetail?' &mdash; '+S.manageableDetail:''))
      )
    )+
    h('div','review-section',
      h('div','review-head',h('span','review-head-title','Work type')+h('span','review-edit','Edit','onclick="goToStep(\'worktype\')"'))+
      h('div','review-body',rrow('Work type',S.workType)+rrow('Special messages',S.specialMsgs||'None specified'))
    )+
    h('div','review-section',
      h('div','review-head',h('span','review-head-title','Response preferences')+h('span','review-edit','Edit','onclick="goToStep(\'respondto\')"'))+
      h('div','review-body',rrow('Respond to',S.respondTo.join(', ')||'None')+rrow('Ignore',S.ignore.join(', ')||'None'))
    )+
    h('div','review-section',
      h('div','review-section',
        h('div','review-head',h('span','review-head-title','Additional context')+h('span','review-edit','Edit','onclick="goToStep(\'context\')"'))+
        h('div','review-body',
          h('div','review-row',h('span','review-q','Briefing notes')+h('span','review-a',S.contextNotes?(S.contextNotes.length>200?S.contextNotes.substring(0,200)+'&hellip;':S.contextNotes):'None provided'))
        )
      )+
      h('div','review-head',h('span','review-head-title','Team structure')+h('span','review-edit','Edit','onclick="goToStep(\'agents\')"'))+
      h('div','review-body',
        rrow('Agents',S.agentCount>=200?'200+':S.agentCount)+
        rrow('Teams',S.hasTeams+(S.teamDetail?' &mdash; '+S.teamDetail:''))+
        rrow('Channel routing',S.chanRouting+(S.chanDetail?' &mdash; '+S.chanDetail:''))+
        rrow('Operating hours',S.shifts+(S.shiftsDetail?' &mdash; '+S.shiftsDetail:''))
      )
    )+
    h('div','review-section',
      h('div','review-head',h('span','review-head-title','Features')+h('span','review-edit','Edit','onclick="goToStep(\'feat_autoresponder\')"'))+
      h('div','review-body',featureRows)
    )+
    h('div','q-card','','style="margin-top:1.5rem"')+
    '';
  var emailCard = a.querySelector('.q-card:last-child');
  if(emailCard){
    emailCard.innerHTML =
      h('div','q-label','Consultant email')+
      h('div','q-hint','Responses will be sent to this address.')+
      '<input type="email" id="c-email" value="'+S.consultantEmail+'" oninput="S.consultantEmail=this.value">';
  }
}

function renderComplete(a){
  a.innerHTML = h('div','complete-screen',
    h('div','complete-icon','&#10003;')+
    h('div','complete-title','Questionnaire complete')+
    h('div','complete-desc','Thank you, '+S.company+'. Your responses have been prepared for your Hootsuite consultant.<br><br>Click below to open your email client and send your completed questionnaire to '+h('strong','',S.consultantEmail)+'.')+
    h('div','btn-wrap',
      '<button class="btn btn-success" onclick="doEmail()">&#9993;&nbsp; Send to consultant</button>'+
      '<button class="btn btn-dl" onclick="doDownload()">&#8595;&nbsp; Download JSON only</button>'
    )+
    h('p','','','style="font-size:11px;color:var(--hint);margin-top:1.5rem;line-height:1.6"')+
    ''
  );
  var note = a.querySelector('p:last-child');
  if(note) note.textContent = 'Your consultant will use these responses to configure your Hootsuite Nest workspace.';
}

function buildJSON(){
  var rtOpts = [['rt-help','Help / customer service questions'],['rt-engage','Invitations to engage'],['rt-mentions','Mentions'],['rt-dms','Direct messages'],['rt-emojis','Emojis or reactions'],['rt-complaints','Complaints or negative sentiment'],['rt-other','Other']];
  var igOpts = [['ig-spam','Spam'],['ig-bot','Bot or automated messages'],['ig-dup','Duplicate messages'],['ig-abuse','Abusive language'],['ig-praise','Generic praise or emojis'],['ig-offtopic','Off-topic comments'],['ig-lang','Messages in other languages'],['ig-comp','Competitor mentions'],['ig-collab','Influencer or collab requests'],['ig-other','Other']];
  S.respondTo = rtOpts.filter(function(o){ var b=el(o[0]); return b&&b.classList.contains('on'); }).map(function(o){ return o[1]; });
  S.ignore = igOpts.filter(function(o){ var b=el(o[0]); return b&&b.classList.contains('on'); }).map(function(o){ return o[1]; });
  return {
    meta:{ generated:new Date().toISOString(), company:S.company, industry:S.industry, consultantEmail:S.consultantEmail },
    contextNotes: S.contextNotes,
    session1:{ company:S.company, industry:S.industry, role:S.role, volume:{count:S.volNum>=500?'500+':S.volNum, period:S.volPeriod}, manageable:S.manageable, manageableDetail:S.manageableDetail, workType:S.workType, specialMessages:S.specialMsgs, respondTo:S.respondTo, ignore:S.ignore, sampleTraining:S.samples },
    session2:{ agentCount:S.agentCount>=200?'200+':S.agentCount, hasTeams:S.hasTeams, teamDetail:S.teamDetail, channelRouting:S.chanRouting, channelRoutingDetail:S.chanDetail, shifts:S.shifts, shiftsDetail:S.shiftsDetail, features:S.features }
  };
}

function doDownload(){
  var data = JSON.stringify(buildJSON(),null,2);
  var blob = new Blob([data],{type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download=(S.company||'company').replace(/\s+/g,'-').toLowerCase()+'-nest-questionnaire.json';
  a.click(); URL.revokeObjectURL(url);
}

function doEmail(){
  doDownload();
  var subj = encodeURIComponent('Hootsuite Nest Setup Questionnaire — '+S.company);
  var body = encodeURIComponent('Hi,\n\nPlease find attached the completed Hootsuite Nest setup questionnaire for '+S.company+'.\n\nCompany: '+S.company+'\nIndustry: '+S.industry+'\nAgents: '+(S.agentCount>=200?'200+':S.agentCount)+'\n\nThe JSON file with full responses is attached.\n\nKind regards');
  window.location.href='mailto:'+S.consultantEmail+'?subject='+subj+'&body='+body;
}

function saveCurrentStep(){
  var step = STEPS[S.step];
  if(step==='context'){
    var cn=el('ctx-notes'); if(cn) S.contextNotes=cn.value;
  }
  if(step==='company'){ var c=el('co'); if(c) S.company=c.value.trim(); }
  if(step==='industry'){
    var spec=el('ind-spec');
    if(spec&&!spec.classList.contains('hidden')){ var ii=el('ind-inp'); if(ii) S.industry=ii.value.trim(); }
    S.indConfirmed=true;
  }
  if(step==='samples'){
    S.samples.forEach(function(s,i){
      var escInp=document.querySelectorAll('.sample-extra')[i]&&document.querySelectorAll('.sample-extra')[i].querySelector('input[placeholder*="Escalate"]');
      if(escInp) s.escalateTo=escInp.value;
    });
  }
  if(step.indexOf('feat_')===0){
    var key=step.replace('feat_','');
    var plusInp=el('feat-plus-inp');
    if(plusInp){ S.features[key]=S.features[key]||{}; S.features[key].extra=plusInp.value; }
    var txtInp=el('feat-txt');
    if(txtInp){ S.features[key]=S.features[key]||{}; S.features[key].value=txtInp.value; }
  }
}

function validate(){
  var step=STEPS[S.step];
  if(step==='company'&&!S.company.trim()){ showErr('Please enter your company name.'); return false; }
  if(step==='role'&&!S.role){ showErr('Please select your role.'); return false; }
  if(step==='volume'&&!S.volPeriod){ showErr('Please select a time period.'); return false; }
  if(step==='manageable'&&!S.manageable){ showErr('Please select an option.'); return false; }
  if(step==='worktype'&&!S.workType){ showErr('Please select your work type.'); return false; }
  if(step==='shifts'&&!S.shifts){ showErr('Please select your operating hours.'); return false; }
  return true;
}

function showErr(msg){
  var e=document.querySelector('.err'); if(e) e.remove();
  var d=document.createElement('div'); d.className='err'; d.textContent=msg;
  var nb=el('nav-bar'); if(nb) nb.insertAdjacentElement('beforebegin',d);
  setTimeout(function(){ d.remove(); },3000);
}

function goNext(){
  if(!validate()) return;
  saveCurrentStep();
  if(S.step<STEPS.length-1){ S.step++; window.scrollTo(0,0); render(); }
}

function goBack(){
  if(S.step>0){ S.step--; window.scrollTo(0,0); render(); }
}

function goToStep(stepId){
  var idx=STEPS.indexOf(stepId);
  if(idx>=0){ S.step=idx; window.scrollTo(0,0); render(); }
}

function updateNav(){
  var step=STEPS[S.step];
  var back=el('btn-back'), next=el('btn-next'), hint=el('nav-hint');
  if(back) back.className='btn btn-secondary'+(S.step>0?'':' hidden');
  if(next){
    if(step==='complete'){ next.style.display='none'; }
    else {
      next.style.display='block';
      next.textContent=step==='cover'?'Start \u2192':step==='review'?'Submit \u2192':'Continue \u2192';
    }
  }
  if(hint){
    var s1e=STEPS.indexOf('samples'), s2e=STEPS.indexOf('s3intro');
    if(S.step<=s1e) hint.textContent='Session 1 of 3 \u2014 Who you are';
    else if(S.step<=s2e) hint.textContent='Session 2 of 3 \u2014 How you work';
    else hint.textContent='Session 3 of 3 \u2014 Review & submit';
  }
}

function injectProgress(){
  if(document.querySelector('.progress-bar')) return;
  var bar=document.createElement('div'); bar.className='progress-bar';
  bar.innerHTML='<div class="progress-top"><span class="progress-label">Setup progress</span><span class="progress-pct" id="pp">0%</span></div><div class="progress-track"><div class="progress-fill" id="pf" style="width:0%"></div></div><div class="session-dots"><div class="sdot" id="sd0"></div><div class="sdot" id="sd1"></div><div class="sdot" id="sd2"></div></div>';
  var pg=document.querySelector('.page'); if(pg) pg.insertAdjacentElement('afterbegin',bar);
}

function updateProgress(){
  var pct=Math.round(S.step/(STEPS.length-1)*100);
  var pf=el('pf'), pp=el('pp');
  if(pf) pf.style.width=pct+'%';
  if(pp) pp.textContent=pct+'%';
  var s1e=STEPS.indexOf('samples'), s2e=STEPS.indexOf('s3intro');
  function sdot(id,state){ var d=el(id); if(d) d.className='sdot'+(state?' '+state:''); }
  sdot('sd0',S.step>s1e?'done':S.step>0?'active':'');
  sdot('sd1',S.step>s2e?'done':S.step>s1e?'active':'');
  sdot('sd2',S.step===STEPS.length-1?'done':S.step>s2e?'active':'');
}

// Boot
render();
setTimeout(function(){
  if(S.step>0){ injectProgress(); updateProgress(); }
  var origRender=render;
  render=function(){
    origRender();
    if(S.step>0){ setTimeout(injectProgress,50); setTimeout(updateProgress,60); }
  };
},50);
</script>
</body>
</html>
